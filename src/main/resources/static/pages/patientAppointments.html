<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
    <link rel="icon" href="../assets/images/logo/logo.png" />

    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/adminDashboard.css" />
    <link rel="stylesheet" href="../assets/css/doctorDashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">

    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
</head>
<body>

    <div class="container" id="container">
        <div class="wrapper" id="wrapper">

            <div id="header"></div>

            <main class="main-content" id="mainContent">

                <div class="search-section" id="searchSection">
                    <input
                        type="text"
                        id="searchBar"
                        placeholder="Search by doctor name"
                    />
                </div>

                <div class="filter-section" id="filterSection">

                    <select class="filter-select" id="filterCondition">
                        <option value="">Filter by Status</option>
                        <option value="pending">Pending</option>
                        <option value="consulted">Consulted</option>
                        <option value="cancelled">Cancelled</option>
                    </select>

                </div>

                <div id="content">
                    <table id="appointmentTable">
                        <thead>
                            <tr>
                                <th>Appointment ID</th>
                                <th>Doctor</th>
                                <th>Specialty</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentTableBody">
                        </tbody>
                    </table>
                </div>

            </main>

            <div id="footer"></div>

        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
    <script type="module" src="../js/patientAppointment.js" defer></script>
</body>
</html>
