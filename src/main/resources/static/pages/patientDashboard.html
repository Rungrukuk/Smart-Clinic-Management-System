<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard</title>
    <link rel="icon" href="../assets/images/logo/logo.png" />

    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/adminDashboard.css" />
    <link rel="stylesheet" href="../assets/css/patientDashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container" id="container">
        <div class="wrapper" id="wrapper">

            <div id="header"></div>

            <main class="main-content" id="mainContent">

                <div class="search-section">
                    <input
                        type="text"
                        id="searchBar"
                        placeholder="Search by doctor name"
                    />
                </div>

                <div class="filter-section">
                    <div class="filter-wrapper">
                        <select class="filter-select" id="filterTime">
                            <option value="">Filter by Time</option>
                            <option value="am">AM</option>
                            <option value="pm">PM</option>
                        </select>

                        <select class="filter-select" id="filterSpecialty">
                            <option value="">Filter by Specialty</option>
                            <option value="cardiology">Cardiology</option>
                            <option value="dermatology">Dermatology</option>
                            <option value="neurology">Neurology</option>
                            <option value="pediatrics">Pediatrics</option>
                        </select>
                    </div>
                </div>

                <div id="content"></div>

            </main>

            <div id="footer"></div>

        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
    <script type="module" src="../js/components/modals.js"></script>
    <script type="module" src="../js/patientDashboard.js" defer></script>
</body>
</html>
