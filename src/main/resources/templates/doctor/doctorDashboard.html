<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="icon" th:href="@{/assets/images/logo/logo.png}" />

    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container" id="container">
        <div class="wrapper" id="wrapper">

            <div id="header"></div>

            <main class="main-content" id="mainContent">

                <div class="search-section">
                    <input
                        type="text"
                        id="searchBar"
                        placeholder="Search by patient name"
                    />
                </div>

                <div class="filter-section">
                    <button id="todayBtn" class="button">Today's Appointments</button>
                    <input type="date" id="datePicker" class="input-field" />
                </div>

                <div id="content">
                    <table id="patientTable">
                        <thead>
                            <tr>
                                <th>Patient ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Prescription</th>
                            </tr>
                        </thead>
                        <tbody id="patientTableBody">
                        </tbody>
                    </table>
                </div>

            </main>

            <div id="footer"></div>

        </div>
    </div>

    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
    <script type="module" th:src="@{/js/doctorDashboard.js}" defer></script>
</body>
</html>
